<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border: 1px solid black;
            width: 500px;
            text-align: center;
            margin: auto;
            border-collapse: collapse;
            position: relative; 
            table-layout: fixed; 
        }

        
        th, td {
            width: 25%;
            border: 1px solid #ccc;
            padding: 8px 0;
        }

        #mid1, #parent {
            border: 1px solid black;
            text-align: center;
        }

        #parent {
            height: 800px;
        }

        a {
            text-decoration: none;
            color: black;
            display: block; 
        }

        
        tbody {
            display: none;
            background: white;
            position: absolute;
            width: 100%;    
            left: -1px; 
            top: 100%; 
            box-sizing: content-box; 
            border: 1px solid black;
            z-index: 10;
        }

        
        table:hover tbody {
             display: block; 
        }

        
        tbody tr {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        thead {
            background: #eee;
        }
    </style>
</head>
